[pytest]
pythonpath = .
testpaths =
    tests
    test_ux_fixes.py
python_files = test_*.py
python_functions = test_*
addopts = -q --strict-markers
markers =
    e2e: opt-in browser tests requiring ALORA_E2E_URL
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
