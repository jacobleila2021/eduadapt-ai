name: Production Gates

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m compileall -q .
      - name: Universal source and typed-routing gates
        run: python -m pytest tests/test_universal_lesson_engine_v3.py --tb=short
      - run: python -m pytest --tb=short
      - run: python -m pip_audit -r requirements.txt

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m playwright install --with-deps chromium firefox webkit
      - name: Start Streamlit
        run: |
          python -m streamlit run app.py --server.headless true --server.address 127.0.0.1 --server.port 8501 > streamlit.log 2>&1 &
          for i in {1..60}; do
            curl -fsS http://127.0.0.1:8501/_stcore/health && break
            sleep 2
          done
      - name: Run browser and responsive gates
        env:
          ALORA_E2E_URL: http://127.0.0.1:8501
          ALORA_EXPECTED_VERSION: "3.1.1"
        run: python -m pytest tests/e2e -m e2e --tb=short
